<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WhatsApp Link Example</title>
  <style>
    body { margin: 0; padding: 24px; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f7f4; color: #17211f; }
    main { max-width: 720px; margin: auto; padding: 24px; border: 1px solid #d8e1dc; border-radius: 8px; background: #fff; }
    label { display: grid; gap: 6px; margin: 12px 0; font-weight: 700; }
    input, textarea, button { font: inherit; border-radius: 6px; }
    input, textarea { width: 100%; padding: 10px; border: 1px solid #d8e1dc; }
    button { padding: 10px 14px; border: 0; color: #fff; background: #0f766e; font-weight: 800; }
  </style>
</head>
<body>
  <main>
    <h1>WhatsApp Link Example</h1>
    <label>Phone number <input id="phone" value="77000000000"></label>
    <label>Message <input id="message" value="Hello, I would like to discuss a project."></label>
    <button type="button" id="generate">Generate</button>
    <label>Result <textarea id="result" readonly></textarea></label>
  </main>
  <script>
    document.getElementById("generate").addEventListener("click", function () {
      const phone = document.getElementById("phone").value.replace(/\D/g, "");
      const message = document.getElementById("message").value.trim();
      document.getElementById("result").value = `https://wa.me/${phone}${message ? `?text=${encodeURIComponent(message)}` : ""}`;
    });
  </script>
</body>
</html>
